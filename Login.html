<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoundU Login</title>
  <link rel="stylesheet" href="Login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="bg-orb orb-one" aria-hidden="true"></div>
  <div class="bg-orb orb-two" aria-hidden="true"></div>
  <div class="bg-orb orb-three" aria-hidden="true"></div>

  <main class="login-shell">
    <article class="login-panel">
      <div class="logo-section">
        <div class="logo-badge">
          <i class="fas fa-hand-holding-heart"></i>
        </div>
        <h1>FoundU</h1>
        <p class="tagline">Admin Portal</p>
      </div>

      <section class="form-section">
        <h2>Secure Login</h2>
        <p class="form-subtitle">Access the admin dashboard to review and approve reports.</p>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="schoolId" class="form-label">School ID</label>
            <div class="input-wrapper">
              <i class="fas fa-id-badge"></i>
              <input type="text" id="schoolId" placeholder="Your School ID" required />
            </div>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" placeholder="Your Password" required />
            </div>
          </div>

          <button type="submit" class="login-btn">
            <span>Sign In</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </form>

        <p id="errorMsg" class="error-msg"></p>
      </section>
    </article>
  </main>

  <script src="Login.js"></script>
</body>
</html>
